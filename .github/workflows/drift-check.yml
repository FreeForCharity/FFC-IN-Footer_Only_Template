name: FFC Drift Check

# Enforces footer-only template best practices on PRs and main.
# See scripts/check-drift.mjs for the adapted ruleset.

on:
  pull_request:
    branches: ['main']
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  drift:
    name: Verify FFC footer-only drift rules
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Run drift check
        run: npm run check:drift

      # Validates src/lib/site.config.ts against the shared cross-template
      # SiteConfig contract (schema/site-config.schema.json, kept identical
      # in FFC-IN-FFC_Single_Page_Template and FFC-IN-Footer_Only_Template).
      - name: Run shared SiteConfig contract check
        run: npm run check:site-config

      # Report-only (always exits 0 on the template — FFC defaults are the
      # canonical values here). Forks can gate with `--strict` in their own CI.
      - name: Rebrand checklist (report only)
        run: npm run check:rebrand
