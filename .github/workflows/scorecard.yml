name: OpenSSF Scorecard

# Runs the OpenSSF Scorecard on a weekly cadence and on pushes to main.
# Results are uploaded to GitHub code scanning (Security tab) so that
# regressions in supply-chain posture are visible alongside CodeQL findings.
#
# Docs: https://github.com/ossf/scorecard-action

on:
  branch_protection_rule:
    types: [created, edited, deleted]
  schedule:
    - cron: '23 4 * * 1' # weekly, Monday 04:23 UTC
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          publish_results: false

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: scorecard-results
          path: scorecard-results.sarif
          retention-days: 7

      - name: Upload to code scanning
        uses: github/codeql-action/upload-sarif@411bbbe57033eedfc1a82d68c01345aa96c737d7 # v4
        with:
          sarif_file: scorecard-results.sarif
